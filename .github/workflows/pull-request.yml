name: Pull Request

on:
  pull_request:
    branches:
      - master

permissions:
  contents: read
  pull-requests: read
  security-events: write

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      api_changed: ${{ steps.paths.outputs.api }}
      client_changed: ${{ steps.paths.outputs.client }}
      has_changes: ${{ steps.paths.outputs.api == 'true' || steps.paths.outputs.client == 'true' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Detect changed paths
        id: paths
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        with:
          filters: |
            api:
              - 'api/**'
            client:
              - 'client/**'

  build-changed-on-pr:
    if: github.event_name == 'pull_request' && needs.detect-changes.outputs.has_changes == 'true'
    needs: detect-changes
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            context: ./api
            dockerfile: ./api/Dockerfile
            image: url-shortener-api
            has_changes: true #${{ needs.detect-changes.outputs.api_changed == 'true' }}
          - name: client
            context: ./client
            dockerfile: ./client/Dockerfile
            image: url-shortener-client
            has_changes: true #${{ needs.detect-changes.outputs.client_changed == 'true' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build API test target
        if: ${{ matrix.has_changes && matrix.name == 'api' }}
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          target: test
          push: false
          no-cache: true
          cache-from: type=gha,scope=${{ matrix.name }}-pr
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}-pr

      - name: Build changed ${{ matrix.name }} image
        if: ${{ matrix.has_changes }}
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          load: true
          no-cache: true
          cache-from: type=gha,scope=${{ matrix.name }}-pr
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}-pr
          tags: ${{ matrix.image }}:pr-${{ github.event.pull_request.number }}-${{ github.sha }}

      - name: Trivy scan changed ${{ matrix.name }} image for vulnerabilities and secrets
        if: ${{ matrix.has_changes }}
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: image
          image-ref: ${{ matrix.image }}:pr-${{ github.event.pull_request.number }}-${{ github.sha }}
          scanners: vuln
          vuln-type: library
          ignore-unfixed: false
          format: sarif
          exit-code: '0'
          output: trivy-report-${{ matrix.name }}.json

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@5c8a8a642e79153f5d047b10ec1cba1d1cc65699 # v3
        with:
          sarif_file: trivy-report-${{ matrix.name }}.json