name: Build Images

on:
  push:
    branches:
      - master

permissions:
  contents: read
  packages: write
  id-token: write
  security-events: write

jobs:
  build-image:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            context: ./api
            dockerfile: ./api/Dockerfile
          - name: client
            context: ./client
            dockerfile: ./client/Dockerfile

    name: build-${{ matrix.name }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Install Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize image namespace
        id: image_namespace
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - id: docker_meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ghcr.io/${{ steps.image_namespace.outputs.owner }}/url-shortener-${{ matrix.name }}
          tags: |
            type=sha,format=long,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build API test target
        if: ${{ matrix.name == 'api' }}
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          target: test
          push: false
          cache-from: type=gha,scope=${{ matrix.name }}-push
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}-push

      - name: Build and push ${{ matrix.name }} image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        id: build-and-push
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          cache-from: type=gha,scope=${{ matrix.name }}-push
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}-push
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}

      - name: Sign the images with GitHub OIDC Token
        env:
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
          TAGS: ${{ steps.docker_meta.outputs.tags }}
        run: |
          images=""
          for tag in ${TAGS}; do
            images+="${tag}@${DIGEST} "
          done
          cosign sign --yes ${images}

      - name: Trivy scan ${{ matrix.name }} image for OS vulnerabilities
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: image
          image-ref: ghcr.io/${{ steps.image_namespace.outputs.owner }}/url-shortener-${{ matrix.name }}@${{ steps.build-and-push.outputs.digest }}
          scanners: vuln
          vuln-type: os
          ignore-unfixed: false
          format: sarif
          output: trivy-${{ matrix.name }}-os.sarif
          exit-code: '0'

      - name: Upload OS SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          sarif_file: trivy-${{ matrix.name }}-os.sarif
          category: trivy-${{ matrix.name }}-os

      - name: Trivy scan ${{ matrix.name }} image for library vulnerabilities
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: image
          image-ref: ghcr.io/${{ steps.image_namespace.outputs.owner }}/url-shortener-${{ matrix.name }}@${{ steps.build-and-push.outputs.digest }}
          scanners: vuln
          vuln-type: library
          ignore-unfixed: false
          format: sarif
          output: trivy-${{ matrix.name }}-library.sarif
          exit-code: '0'

      - name: Upload library SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          sarif_file: trivy-${{ matrix.name }}-library.sarif
          category: trivy-${{ matrix.name }}-library

  sync-kustomize-base:
    runs-on: ubuntu-latest
    needs: build-image
    steps:
      - name: Checkout App Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: app

      - name: Create GitHub App token
        id: app_token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.GITOPS_APP_ID }}
          private-key: ${{ secrets.GITOPS_APP_PRIVATE_KEY }}
          owner: BoredOtter
          repositories: url-shortener-argocd

      - name: Checkout GitOps Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: BoredOtter/url-shortener-argocd
          token: ${{ steps.app_token.outputs.token }}
          path: gitops

      - name: Render and Copy Manifests
        run: |
          mkdir -p gitops/kustomize/base
          rsync -a --delete app/kustomize/base/ gitops/kustomize/base/
          
          cd gitops/kustomize/base
          find . -type f -name '*.yaml' -print0 | xargs -0 sed -i "s/COMMIT_SHA/${{ github.sha }}/g"

      - name: Commit and Push to GitOps
        run: |
          cd gitops
          git config user.name "gitops-boredotter[bot]"
          git config user.email "273776110+gitops-boredotter[bot]@users.noreply.github.com"
          
          git add kustomize/base

          git commit -m "chore: sync kustomize base from ${GITHUB_REPOSITORY}@${GITHUB_SHA}"
          git push origin HEAD
