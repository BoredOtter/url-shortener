name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  promote-images:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: url-shortener-api
          - image: url-shortener-client

    name: promote-${{ matrix.image }}
    steps:
      - name: Normalize image namespace
        id: image_namespace
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Install Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Retag image from commit SHA to release tag
        env:
          OWNER: ${{ steps.image_namespace.outputs.owner }}
          IMAGE: ${{ matrix.image }}
          SHA_TAG: ${{ github.sha }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/${OWNER}/${IMAGE}:${RELEASE_TAG} \
            ghcr.io/${OWNER}/${IMAGE}:${SHA_TAG}

      - name: Verify cosign signature on promoted tag
        env:
          OWNER: ${{ steps.image_namespace.outputs.owner }}
          IMAGE: ${{ matrix.image }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          cosign verify \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity "https://github.com/${GITHUB_REPOSITORY}/.github/workflows/build-images.yml@refs/heads/master" \
            ghcr.io/${OWNER}/${IMAGE}:${RELEASE_TAG}

  sync-kustomize-prod:
    runs-on: ubuntu-latest
    needs: promote-images
    steps:
      - name: Checkout App Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: app

      - name: Create GitHub App token
        id: app_token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.GITOPS_APP_ID }}
          private-key: ${{ secrets.GITOPS_APP_PRIVATE_KEY }}
          owner: BoredOtter
          repositories: url-shortener-argocd

      - name: Checkout GitOps Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: BoredOtter/url-shortener-argocd
          token: ${{ steps.app_token.outputs.token }}
          path: gitops

      - name: Render and Copy Prod Manifests
        run: |
          mkdir -p gitops/kustomize/prod/base
          rsync -a --delete app/kustomize/base/ gitops/kustomize/prod/base/

          cd gitops/kustomize/prod/base
          find . -type f -name '*.yaml' -print0 | xargs -0 sed -i "s/COMMIT_SHA/${{ github.ref_name }}/g"

      - name: Commit and Push Prod Manifests
        run: |
          cd gitops
          git config user.name "gitops-boredotter[bot]"
          git config user.email "273776110+gitops-boredotter[bot]@users.noreply.github.com"

          git add kustomize/prod
          git commit -m "chore(prod): promote release ${GITHUB_REF_NAME}" || exit 0
          git push origin HEAD
