name: Security Scan

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - Build Images
    types:
      - completed
    branches:
      - master
  schedule:
    - cron: '0 * * * *'

permissions:
  contents: read
  packages: read
  security-events: write

jobs:
  trivy-image-scan:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'master') }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            image: url-shortener-api
          - name: client
            image: url-shortener-client

    steps:
      - name: Normalize image namespace and commit SHA
        id: image_meta
        env:
          HEAD_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
          echo "head_sha=${HEAD_SHA}" >> "$GITHUB_OUTPUT"

      - name: Install Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Login to GitHub Container Registry
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify ${{ matrix.name }} image signature with Cosign
        env:
          IMAGE_REF: ghcr.io/${{ steps.image_meta.outputs.owner }}/${{ matrix.image }}:${{ steps.image_meta.outputs.head_sha }}
          CERT_IDENTITY: https://github.com/${{ github.repository }}/.github/workflows/build-images.yml@refs/heads/master
          CERT_ISSUER: https://token.actions.githubusercontent.com
        run: |
          cosign verify \
            --certificate-identity "${CERT_IDENTITY}" \
            --certificate-oidc-issuer "${CERT_ISSUER}" \
            "${IMAGE_REF}"

      - name: Trivy scan ${{ matrix.name }} HEAD image for OS vulnerabilities
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: image
          image-ref: ghcr.io/${{ steps.image_meta.outputs.owner }}/${{ matrix.image }}:${{ steps.image_meta.outputs.head_sha }}
          scanners: vuln
          vuln-type: os
          ignore-unfixed: false
          format: sarif
          output: trivy-${{ matrix.name }}-os.sarif
          exit-code: '0'

      - name: Upload OS SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          sarif_file: trivy-${{ matrix.name }}-os.sarif
          category: trivy-${{ matrix.name }}-os

      - name: Trivy scan ${{ matrix.name }} HEAD image for library vulnerabilities
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: image
          image-ref: ghcr.io/${{ steps.image_meta.outputs.owner }}/${{ matrix.image }}:${{ steps.image_meta.outputs.head_sha }}
          scanners: vuln
          vuln-type: library
          ignore-unfixed: false
          format: sarif
          output: trivy-${{ matrix.name }}-library.sarif
          exit-code: '0'

      - name: Upload library SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          sarif_file: trivy-${{ matrix.name }}-library.sarif
          category: trivy-${{ matrix.name }}-library
