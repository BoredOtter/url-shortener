services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    command: >-
      sh -c "mkdir -p /tmp/uv-cache &&
      uv sync --frozen --no-dev &&
      uvicorn main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app"
    volumes:
      - ./api:/app
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CORS_ALLOW_ORIGINS=http://localhost:5173,http://127.0.0.1:5173
      - UV_CACHE_DIR=/tmp/uv-cache
      - HOME=/tmp
      - WATCHFILES_FORCE_POLLING=true
    depends_on:
      - redis

  client:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    command: >-
      sh -c "yarn install --immutable &&
      yarn dev --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - client-node-modules:/app/node_modules
    depends_on:
      - api

  client-prod:
    profiles: ["prod"]
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - api

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  client-node-modules:

