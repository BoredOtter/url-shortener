apiVersion: apps/v1
kind: Deployment
metadata:
  name: client
  namespace: {{ .Release.Namespace }}
  labels:
    app: client
    {{- include "url-shortener.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.client.replicas }}
  selector:
    matchLabels:
      app: client
  template:
    metadata:
      labels:
        app: client
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: client
          image: "{{ .Values.client.image.repository }}:{{ .Values.client.image.tag }}"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          imagePullPolicy: {{ .Values.client.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.client.containerPort }}
              name: http
          env:
            - name: VITE_API_BASE_URL
              value: {{ .Values.client.env.VITE_API_BASE_URL | quote }}
          resources:
            {{- toYaml .Values.client.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: client
  namespace: {{ .Release.Namespace }}
  labels:
    app: client
    {{- include "url-shortener.labels" . | nindent 4 }}
spec:
  selector:
    app: client
  ports:
    - name: http
      port: {{ .Values.client.service.port }}
      targetPort: {{ .Values.client.service.targetPort }}
