apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: {{ .Release.Namespace }}
  labels:
    app: api
    {{- include "url-shortener.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: REDIS_HOST
              value: {{ .Values.api.env.REDIS_HOST | quote }}
            - name: REDIS_PORT
              value: {{ .Values.api.env.REDIS_PORT | quote }}
            - name: REDIS_CONNECT_TIMEOUT
              value: {{ .Values.api.env.REDIS_CONNECT_TIMEOUT | quote }}
            - name: REDIS_SOCKET_TIMEOUT
              value: {{ .Values.api.env.REDIS_SOCKET_TIMEOUT | quote }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          startupProbe:
            httpGet:
              path: {{ .Values.api.probes.startup.path }}
              port: http
            failureThreshold: {{ .Values.api.probes.startup.failureThreshold }}
            periodSeconds: {{ .Values.api.probes.startup.periodSeconds }}
            timeoutSeconds: {{ .Values.api.probes.startup.timeoutSeconds }}
          livenessProbe:
            httpGet:
              path: {{ .Values.api.probes.liveness.path }}
              port: http
            failureThreshold: {{ .Values.api.probes.liveness.failureThreshold }}
            periodSeconds: {{ .Values.api.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.api.probes.liveness.timeoutSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.api.probes.readiness.path }}
              port: http
            failureThreshold: {{ .Values.api.probes.readiness.failureThreshold }}
            periodSeconds: {{ .Values.api.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.api.probes.readiness.timeoutSeconds }}
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: {{ .Release.Namespace }}
  labels:
    app: api
    {{- include "url-shortener.labels" . | nindent 4 }}
spec:
  selector:
    app: api
  ports:
    - name: http
      port: {{ .Values.api.service.port }}
      targetPort: {{ .Values.api.service.targetPort }}
