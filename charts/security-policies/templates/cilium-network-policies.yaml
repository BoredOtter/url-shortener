---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: default-deny
  namespace: {{ .Release.Namespace }}
spec:
  endpointSelector: {}
  ingress: []
  egress:
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": kube-system
            "k8s-app": kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: ANY
          rules:
            dns:
              - matchPattern: "*"
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: client-traffic
  namespace: {{ .Release.Namespace }}
spec:
  endpointSelector:
    matchLabels:
      app: client
  ingress:
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": ingress-nginx
            "k8s:app.kubernetes.io/name": ingress-nginx
            "k8s:app.kubernetes.io/component": controller
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
          rules:
            http:
              - {} 
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: api-traffic
  namespace: {{ .Release.Namespace }}
spec:
  endpointSelector:
    matchLabels:
      app: api
  ingress:
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": ingress-nginx
            "k8s:app.kubernetes.io/name": ingress-nginx
            "k8s:app.kubernetes.io/component": controller
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP
          rules:
            http:
              - {} 
  egress:
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": {{ .Release.Namespace | quote }}
            "k8s:app": redis
      toPorts:
        - ports:
            - port: "6379"
              protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: redis-traffic
  namespace: {{ .Release.Namespace }}
spec:
  endpointSelector:
    matchLabels:
      app: redis
  ingress:
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": {{ .Release.Namespace | quote }}
            "k8s:app": api
      toPorts:
        - ports:
            - port: "6379"
              protocol: TCP